<!DOCTYPE html>
<html>
<body>
    <h2>Finalizar Compra - R$ 899,99</h2>
    <form action="/checkout/processar" method="POST">
        {% csrf_token %}
        <input type="text" name="nome" placeholder="Nome completo" required><br><br>
        <input type="email" name="email" placeholder="E-mail" required><br><br>
        <input type="tel" name="telefone" placeholder="WhatsApp" required><br><br>
        <button type="submit">PAGAR AGORA</button>
    </form>
</body>
</html>
