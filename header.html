<!-- header.html -->
<header>
  <div class="container">
    <h1 class="site-title">YI-SELL</h1>
    <p class="tech-space-tagline">Finance • News • Trading • Marketplace</p>

    <!-- Adicione isso dentro da <nav class="header-nav">, depois do último <a> -->
<div class="auth-area">
  <button type="button" id="signupToggle" class="ripple-btn signup-trigger" aria-expanded="false">
    <span>Sign Up</span>
  </button>

  <div id="signupDropdown" class="signup-dropdown" hidden>
    <form id="headerSignupForm" action="/api/register" method="POST">
      <h3>Create Account</h3>

      <label for="signup-name">Full Name</label>
      <input type="text" id="signup-name" name="name" required autocomplete="name">

      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" name="email" required autocomplete="email">

      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" name="password" required minlength="8" autocomplete="new-password">

      <label for="signup-confirm">Confirm Password</label>
      <input type="password" id="signup-confirm" name="confirmPassword" required minlength="8" autocomplete="new-password">

      <button type="submit" class="ripple-btn">Register</button>
      <p id="signupMsg" class="form-message"></p>
    </form>
  </div>
</div>
    
    <nav class="header-nav">
      <a href="TradingTools.html" class="ripple-btn">
        <img src="docs/rob.gif" alt="Forex Trading Algorithms">
      </a>
      <a href="market_over_view.html" class="ripple-btn">
        <img src="docs/exchanges.gif" alt="Market Watch">
      </a>
      <a href="headlines.html" class="ripple-btn">
        <img src="docs/headtitle.gif" alt="Headlines">
      </a>
      <a href="classifieds.html" class="ripple-btn">
        <img src="docs/classsified.gif" alt="Classified">
      </a>
      <a href="shoppingcart.html" class="ripple-btn">
        <img src="docs/shoppingcart.gif" alt="Shopping">
      </a>
    </nav>
    
    <p class="welcome-text">
   नमस्ते • Bem-vindo • Welcome • Bienvenue • 欢迎 • ようこそ • 환영합니다 • こんにちは • 안녕하세요 • Xin chào • Sawubona • Jambo • Ciao • Hall • שָׁלוֹם • Γειά σου • Merhaba • مَرْحَبًا • Привет • Guten Tag • สวัสดี • Halo • Cześć • Kumusta
    </p>
  </div>
  <script>
(function() {
  const toggle = document.getElementById('signupToggle');
  const dropdown = document.getElementById('signupDropdown');
  const form = document.getElementById('headerSignupForm');
  const msg = document.getElementById('signupMsg');

  if (!toggle ||!dropdown) return;

  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const isHidden = dropdown.hasAttribute('hidden');
    dropdown.toggleAttribute('hidden',!isHidden);
    toggle.setAttribute('aria-expanded', isHidden? 'true' : 'false');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.auth-area')) {
      dropdown.setAttribute('hidden', '');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = '';

    const data = Object.fromEntries(new FormData(form));

    if (data.password!== data.confirmPassword) {
      msg.textContent = 'Passwords do not match';
      msg.style.color = '#ff5252';
      return;
    }

    msg.textContent = 'Registering...';
    msg.style.color = '#fff';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: data.name,
          email: data.email,
          password: data.password
        })
      });

      const result = await res.json();

      if (res.ok) {
        msg.textContent = result.message || 'Success!';
        msg.style.color = '#4caf50';
        form.reset();
        setTimeout(() => dropdown.setAttribute('hidden', ''), 2000);
      } else {
        msg.textContent = result.message || 'Registration failed';
        msg.style.color = '#ff5252';
      }
    } catch (err) {
      msg.textContent = 'Network error. Try again.';
      msg.style.color = '#ff5252';
    }
  });
})();
</script>
</header>
