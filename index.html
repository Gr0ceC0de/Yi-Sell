body{
    background:white;

    margin:0;
    padding:0;
}

/* MENU */

nav{
    background:#ffffff;
    padding:15px;
    text-align:center;
}

nav img{
    width:90px;
    transition:0.3s;
}

nav img:hover{
    transform:scale(1.1) rotate(2deg);
}

/* TITULO 3D PLASTILINA */

h1{
    text-align:center;
    font-size:70px;
    margin-top:20px;
    letter-spacing:5px;

    color:#ff00aa;

    text-shadow:
    2px 2px 0px #ffcc00,
    4px 4px 0px #00ccff,
    6px 6px 0px #00ff99,
    8px 8px 15px rgba(0,0,0,0.35);

    animation:colors 4s infinite alternate;
}

/* EFECTO BRILLANTE */

@keyframes colors{

0%{
color:#ff00aa;
}

25%{
color:#00ccff;
}

50%{
color:#00ff99;
}

75%{
color:#ff6600;
}

100%{
color:#cc00ff;
}

}

/* TABLA */

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    margin-top:30px;
    background:white;
    box-shadow:0px 0px 25px rgba(0,0,0,0.2);
    border-radius:20px;
    overflow:hidden;
}

/* CELDAS */

td, th{
    padding:18px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
}

/* ENCABEZADO */

tr:first-child{
    background:linear-gradient(90deg,#ff00aa,#00ccff,#00ff99);
    color:white;
    font-size:24px;
}

/* FILAS */

tr{
    transition:0.3s;
}

tr:nth-child(even){
    background:#f8f8f8;
}

tr:hover{
    background:#fff0ff;
    transform:scale(1.01);
}

/* IMAGENES */

td img{
    width:50px;
}

/* NUMEROS BRILLANTES */

.rate{
    color:#ff0088;
    text-shadow:
    1px 1px 2px #ffcc00,
    0px 0px 10px #00ccff;
}

/* BOTONES BUY SELL */

.action img{
    width:60px;
    transition:0.3s;
}

.action img:hover{
    transform:scale(1.2);
}

</style>
